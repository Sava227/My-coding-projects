<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-Plane 12 Add-ons</title>

</head>
<body>

<!-- Header -->

</div>

<!-- Navigation -->
<div class="nav">
    <a href="#">Home</a>

    <a href="#">Contact</a>
</div>

<!-- Title -->
<h2 class="title">Available Aircraft</h2>

<!-- Products -->
<div class="products">

        <button>Buy</button>

</div>

    <img src="img/mail.svg" class="mail" alt="Mail icon">
