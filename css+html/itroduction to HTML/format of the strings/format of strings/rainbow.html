<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стихотворение</title>
</head>
<body>
    <h1>Радуга</h1>
    <p>
        Солнышко, играя <br>
        В капельках дождя, <br>
        Радугой сверкает. <br>
        В небо уходя,
    </p>
    <p>
        Связывает вместе <br>
        Реки берега <br>
        Мостик поднебесный — <br>
        Радуга-дуга!
    </p>
</body>
</html>
